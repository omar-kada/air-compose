version = 1

test_patterns = ["**/*_test.*"]

exclude_patterns = ["**/src/components/ui/*", "**/src/api/*", "**/api.gen.go"]

[[analyzers]]
name = "test-coverage"

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  plugins = ["react"]
  environment = ["vitest"]


[[analyzers]]
name = "go"
  [analyzers.meta]
    import_root = "github.com/omar-kada/air-compose:backend"

